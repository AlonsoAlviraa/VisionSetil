services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    image: visionsetil:latest
    container_name: visionsetil-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - LOG_FORMAT=json
      - LOG_LEVEL=INFO
    volumes:
      - ./uploads:/app/uploads
      - ./backend/app/data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    profiles: ["full"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: visionsetil-frontend:latest
    container_name: visionsetil-frontend
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped