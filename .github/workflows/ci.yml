name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install backend (dev + runtime)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install bandit

      - name: Ruff
        run: ruff check .

      - name: Black --check
        run: black --check .

      - name: Mypy (non-blocking baseline)
        run: mypy app || true

      - name: Pytest
        run: pytest -q

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for gitleaks

      # ── Bandit: Python SAST ──
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install bandit

      - name: Bandit security scan
        run: bandit -r backend/app -ll -x backend/app/tests
        # -ll = low severity threshold (report medium+high only)
        # -x  = exclude tests

      # ── Gitleaks: secrets in git history ──
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  model-smoke-test:
    runs-on: ubuntu-latest
    needs: lint-type-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Model smoke test
        run: |
          python scripts/verify_detection.py --num-images 5 --threshold 0.25
        env:
          PYTHONDONTWRITEBYTECODE: "1"

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint-type-test, model-smoke-test, frontend-build, security-scan]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image (CPU)
        run: docker build -f Dockerfile.cpu -t visionsetil:ci .