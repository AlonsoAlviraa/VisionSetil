# B-39 / D-B25 — label2idx ↔ catalog_v2 join coverage report
# Cadence: nightly + on-demand (workflow_dispatch). NOT on pull_request.
name: Species index join (nightly)

on:
  schedule:
    # 04:15 UTC nightly
    - cron: "15 4 * * *"
  workflow_dispatch: {}

jobs:
  join-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run label2idx ↔ catalog_v2 join report
        run: python scripts/build_species_index_join.py
        # Exit 0 even if coverage is incomplete — report is informational.

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: species-index-join-report
          path: data/species_catalog/species_index_join_report.json
          if-no-files-found: warn
