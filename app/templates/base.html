<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VisionSetil</title>
    <link rel="stylesheet" href="/static/css/styles.css" />
  </head>
  <body>
    <header class="hero-shell">
      <div class="hero">
        <p class="eyebrow">VisionSetil</p>
        <h1>Observacion visual conservadora para setas</h1>
        <p class="lead">
          Inspirado en mini-programas ligeros: varias fotos, metadatos de campo,
          alerta reforzada para especies venenosas y explicacion educativa.
        </p>
        <div class="warning-banner">{{ safety_disclaimer }}</div>
      </div>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
    <script src="/static/js/app.js"></script>
  </body>
</html>
