# Production-grade compose stack for VisionSetil v0.3.0+
# Usage:
#   export POSTGRES_PASSWORD=... API_KEYS=vs_...:default:admin CORS_ORIGINS=https://app.example.com
#   docker compose -f docker-compose.prod.yml up -d
#
# Required secrets (no weak defaults):
#   POSTGRES_PASSWORD, API_KEYS, CORS_ORIGINS (explicit origins, never *)
#
# Services:
#   - postgresql: Primary database (replaces SQLite)
#   - redis: Distributed cache for embeddings + rate limiting
#   - backend: FastAPI app (CPU-only image)
#   - (optional) frontend served separately or via CDN

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-visionsetil}
      POSTGRES_USER: ${POSTGRES_USER:-visionsetil}
      # Fail-closed: require explicit password (no "changeme")
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    # Not published to host by default — attach to internal network only
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-visionsetil}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD}
    expose:
      - "6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # ── Database ──
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-visionsetil}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-visionsetil}
      # ── Redis ──
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      # ── Runtime / quality gate (B-23 fail-closed) ──
      ENVIRONMENT: production
      MODEL_BLOCK_SPECIES_ID_WHEN_BELOW_GATE: "true"
      # ── ML Config (R3: no mocks in production) ──
      USE_REAL_YOLOE: ${USE_REAL_YOLOE:-false}
      USE_REAL_DINOV3: ${USE_REAL_DINOV3:-false}
      ALLOW_MOCK_FALLBACKS: "false"
      MODEL_FALLBACK_TO_MOCK: "false"
      READYZ_FAIL_ON_MOCK_MODELS: "true"
      # ── Security (required) ──
      API_KEYS: ${API_KEYS:?Set API_KEYS e.g. vs_key:default:admin}
      CORS_ORIGINS: ${CORS_ORIGINS:?Set CORS_ORIGINS to explicit origins}
      TRUST_PROXY: ${TRUST_PROXY:-true}
      RATE_LIMIT_CLASSIFY_REQUESTS: ${RATE_LIMIT_CLASSIFY_REQUESTS:-20}
      RATE_LIMIT_AUTH_REQUESTS: ${RATE_LIMIT_AUTH_REQUESTS:-10}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - model_weights:/app/backend/app/ml/weights
      - upload_data:/app/backend/uploads
    networks:
      - internal
      - edge

networks:
  internal:
    driver: bridge
  edge:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  model_weights:
  upload_data:
